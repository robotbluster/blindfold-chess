<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blindfold Chess</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <div id="header">
      <div id="brand">
        <span class="brand-icon">♟</span>
        <span class="brand-name">Blindfold Chess</span>
      </div>
      <div id="setup">
        <select id="difficulty-select">
          <option value="0">Level 1 – Beginner</option>
          <option value="1">Level 2 – Novice</option>
          <option value="2">Level 3 – Easy</option>
          <option value="3">Level 4 – Casual</option>
          <option value="4" selected>Level 5 – Intermediate</option>
          <option value="5">Level 6 – Advanced</option>
          <option value="6">Level 7 – Strong</option>
          <option value="7">Level 8 – Expert</option>
          <option value="8">Level 9 – Master</option>
          <option value="9">Level 10 – Grandmaster</option>
        </select>
        <div id="color-btns">
          <button class="color-btn active" data-color="w">White</button>
          <button class="color-btn" data-color="b">Black</button>
          <button class="color-btn" data-color="r">Random</button>
        </div>
        <button id="new-game-btn">New Game</button>
      </div>
    </div>

    <div id="main">

      <div id="game-col">
        <div id="opponent-box" class="player-box">
          <span class="player-piece" id="opponent-avatar">♚</span>
          <div class="player-info-col">
            <span class="player-name">Stockfish</span>
            <span class="player-sub" id="engine-level">Level 5 – Intermediate</span>
          </div>
        </div>

        <div id="board-wrap">
          <div id="board"></div>
        </div>

        <div id="player-box" class="player-box">
          <span class="player-piece" id="player-avatar-icon">♔</span>
          <div class="player-info-col">
            <span class="player-name">You</span>
            <span class="player-sub" id="player-color-label">White</span>
          </div>
        </div>

        <div id="board-controls">
          <button id="toggle-vision-btn">Hide Board</button>
          <button id="resign-btn" disabled>Resign</button>
          <button id="speaker-btn" title="Announcements off (click to enable)">&#x1F508;</button>
          <button id="mic-btn" title="Hold to speak">&#x1F3A4;</button>
        </div>
      </div>

      <div id="side-panel">
        <div id="status">Loading engine...</div>
        <div id="move-history">
          <div id="moves-header">Moves</div>
          <div id="moves-list"></div>
        </div>
        <div id="voice-panel" style="display:none">
          <div id="voice-status">
            <span id="voice-dot"></span>
            <span id="voice-status-text">Hold to speak</span>
          </div>
          <div id="chat-messages"></div>
        </div>

        <div id="nav-controls">
          <button id="nav-first" title="First move" disabled>&#x23EE;</button>
          <button id="nav-prev"  title="Previous move (←)" disabled>&#x25C0;</button>
          <button id="nav-next"  title="Next move (→)" disabled>&#x25B6;</button>
          <button id="nav-last"  title="Latest move" disabled>&#x23ED;</button>
          <span id="review-label">Reviewing</span>
        </div>
      </div>

    </div>
  </div>

  <!-- Resign confirmation modal -->
  <div id="resign-modal">
    <div id="resign-card">
      <p>Are you sure you want to resign?</p>
      <div id="resign-actions">
        <button id="resign-confirm-btn">Resign</button>
        <button id="resign-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Promotion modal -->
  <div id="promotion-modal">
    <div id="promotion-content">
      <div id="promo-buttons">
        <button class="promo-btn" data-piece="q"><img src="pieces/cburnett/wQ.svg" draggable="false"><small>Queen</small></button>
        <button class="promo-btn" data-piece="r"><img src="pieces/cburnett/wR.svg" draggable="false"><small>Rook</small></button>
        <button class="promo-btn" data-piece="b"><img src="pieces/cburnett/wB.svg" draggable="false"><small>Bishop</small></button>
        <button class="promo-btn" data-piece="n"><img src="pieces/cburnett/wN.svg" draggable="false"><small>Knight</small></button>
      </div>
    </div>
  </div>

  <!-- Game over overlay -->
  <div id="gameover-overlay">
    <div id="gameover-card">
      <button id="gameover-close">&#x2715;</button>
      <div id="gameover-icon"></div>
      <h2 id="gameover-title"></h2>
      <p id="gameover-subtitle"></p>
      <div id="gameover-actions">
        <button id="gameover-btn">New Game</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
